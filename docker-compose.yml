version: '3.8'
services:
  db:
    image: postgres:15
    container_name: color_freak_db
    restart: always
    environment:
      POSTGRES_USER: admin_color_freak
      POSTGRES_PASSWORD: senha_freak_123
      POSTGRES_DB: color_freak_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: